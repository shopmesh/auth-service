# auth-service CI/CD
# Runtime: Node.js
#
# PR   → code-quality → build (with Trivy)
# main → build (with Trivy) → helm update
name: auth-service

on:
  push:
    branches: [main]
    paths: ["auth-service/**"]
  pull_request:
    branches: [main]
    paths: ["auth-service/**"]

jobs:
  code-quality:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/reusable/code-quality.yml
    with:
      service_name:      auth-service
      service_path:      auth-service
      runtime:           node
      github_event_name: ${{ github.event_name }}
    secrets:
      SONAR_TOKEN:    ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      SNYK_TOKEN:     ${{ secrets.SNYK_TOKEN }}

  build:
    needs: code-quality
    if: always() && (needs.code-quality.result == 'success' || needs.code-quality.result == 'skipped')
    uses: ./.github/workflows/reusable/build.yml
    with:
      service_name: auth-service
      service_path: auth-service
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN:    ${{ secrets.DOCKERHUB_TOKEN }}

  helm:
    needs: build
    if: github.ref_name == 'main' && github.event_name == 'push' && needs.build.result == 'success'
    uses: ./.github/workflows/reusable/helm.yml
    with:
      service_name: auth-service
      image_tag:    ${{ needs.build.outputs.tag }}
      helm_repo:    priyatham753/shopmesh-infra
    secrets:
      HELM_CHARTS_TOKEN: ${{ secrets.HELM_CHARTS_TOKEN }}

  notify:
    needs: [code-quality, build, helm]
    if: failure()
    uses: ./.github/workflows/reusable/notify.yml
    with:
      service_name: auth-service
    secrets:
      SENDGRID_API_KEY:  ${{ secrets.SENDGRID_API_KEY }}
      NOTIFY_FROM_EMAIL: ${{ secrets.NOTIFY_FROM_EMAIL }}
      NOTIFY_TO_EMAIL:   ${{ secrets.NOTIFY_TO_EMAIL }}
