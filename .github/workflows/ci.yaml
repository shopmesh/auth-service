name: auth-service-ci

on:
  push:
    branches: [main, develop]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/**'
  pull_request:
    branches: [main, develop]
  workflow_dispatch:     # allows manual trigger from GitHub UI

jobs:

  validation:
    uses: shopmesh/shared-workflows-template/.github/workflows/validation-ci.yaml@main
    with:
      service_name: auth-service
      service_path: .
      runtime: node
      github_event_name: ${{ github.event_name }}
    secrets: inherit

  build:
    needs: validation
    uses: shopmesh/shared-workflows-template/.github/workflows/generate-tag-and-build-image-trivy.yaml@main
    with:
      service_name: auth-service
      service_path: .
      # Run Trivy on PRs (security gate) — also runs on push for extra safety
      run_trivy: false
    secrets: inherit

  push:
    needs: build
    if: github.event_name == 'push'
    uses: shopmesh/shared-workflows-template/.github/workflows/push.yaml@main
    with:
      service_name: auth-service
      git_tag: ${{ needs.build.outputs.tag }}
      tag_exists: ${{ needs.build.outputs.tag_exists }}
    secrets: inherit
